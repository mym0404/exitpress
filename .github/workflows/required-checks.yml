name: required-checks

on:
  pull_request:
    types:
      - opened
      - synchronize
      - reopened
      - ready_for_review

jobs:
  validate:
    if: github.event.pull_request.draft == false
    runs-on: ubuntu-latest
    container:
      image: mcr.microsoft.com/playwright:v1.59.1-noble
    timeout-minutes: 45
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install CI tools
        run: |
          apt-get update
          apt-get install -y --no-install-recommends unzip
          rm -rf /var/lib/apt/lists/*

      - name: Setup mise
        uses: jdx/mise-action@v3

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run format check
        run: pnpm check:fmt

      - name: Run lint check
        run: pnpm check:lint

      - name: Run type check
        run: pnpm check:type

      - name: Run server build
        run: pnpm check:build:server

      - name: Run Storybook catalog check
        run: pnpm check:storybook

      - name: Run web build
        run: pnpm check:build:web

      - name: Run unused check
        run: pnpm check:unused

      - name: Run Vitest checks
        run: pnpm check:test

      - name: Run Vitest coverage
        run: pnpm check:coverage

      - name: Run Playwright checks
        timeout-minutes: 20
        env:
          EXITPRESS_UPLOAD_E2E: ${{ secrets.EXITPRESS_UPLOAD_E2E }}
          EXITPRESS_UPLOAD_E2E_GITHUB_TOKEN: ${{ secrets.EXITPRESS_UPLOAD_E2E_GITHUB_TOKEN }}
        run: pnpm check:playwright

      - name: Upload coverage reports to Codecov
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
